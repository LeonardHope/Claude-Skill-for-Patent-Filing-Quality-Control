<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Patent Filing QC</title>
<style>
  :root { --bg:#0f1419; --panel:#171c24; --line:#262d39; --text:#e6e9ee; --muted:#8a93a3;
          --accent:#3a4a5f; --accentTx:#dbe7ff; }
  * { box-sizing:border-box; }
  body { margin:0; font:14px/1.45 -apple-system,Segoe UI,Roboto,sans-serif; color:var(--text); background:var(--bg); }
  button { font:inherit; }
  header { padding:10px 16px; border-bottom:1px solid var(--line); background:var(--panel);
           display:flex; align-items:center; gap:14px; flex-wrap:wrap; }
  header b { font-size:15px; } header .folder { color:var(--muted); font-size:12px; }
  .counts span { font-weight:700; padding:2px 8px; border-radius:10px; margin-left:6px; font-size:12px; }
  .hbtn { background:#1d2430; color:var(--text); border:1px solid var(--line); border-radius:6px;
          padding:4px 10px; font-size:12px; cursor:pointer; }
  .hbtn:hover { border-color:var(--accent); }
  .filters { margin-left:auto; display:flex; gap:6px; align-items:center; }
  .filters button { background:#1d2430; color:var(--text); border:1px solid var(--line);
                    border-radius:6px; padding:3px 9px; font-size:12px; cursor:pointer; }
  .filters button.on { background:#2a3340; border-color:var(--accent); }
  .wrap { display:grid; grid-template-columns:420px 1fr; height:calc(100vh - 49px); }
  .checks { overflow:auto; border-right:1px solid var(--line); background:var(--panel); }
  .viewer { overflow:auto; position:relative; padding:16px; }
  .check { padding:11px 14px; border-bottom:1px solid var(--line); }
  .badge { display:inline-block; font-size:11px; font-weight:700; padding:2px 7px; border-radius:10px; margin-right:8px; }
  .PASS { background:#123524; color:#5ee08a; } .CRITICAL { background:#3a1418; color:#ff7a85; }
  .WARNING { background:#3a2e10; color:#ffcf66; } .INFO { background:#10283a; color:#74b9ff; }
  .cname { font-weight:600; } .cmsg { color:var(--muted); margin-top:4px; }
  .ev { margin-top:8px; padding:7px 10px; background:#10141b; border:1px solid var(--line);
        border-radius:6px; font-size:13px; cursor:pointer; }
  .ev:hover { border-color:var(--accent); }
  .ev .tag { font-size:10px; text-transform:uppercase; letter-spacing:.04em; color:var(--muted); }
  .ev.match .tag { color:#5ee08a; } .ev.missing .tag, .ev.mismatch .tag { color:#ff7a85; }
  .pagewrap { position:relative; margin:0 auto 16px; box-shadow:0 2px 18px rgba(0,0,0,.5); width:max-content; }
  canvas { display:block; }
  .hl { position:absolute; background:rgba(255,213,79,.32); outline:2px solid #ffd54f; border-radius:2px;
        animation:pulse 1s ease-in-out 2; }
  @keyframes pulse { 0%,100%{background:rgba(255,213,79,.30);} 50%{background:rgba(255,213,79,.62);} }
  .card { max-width:560px; margin:8px auto; padding:18px 20px; background:var(--panel); border:1px solid var(--line); border-radius:10px; }
  .card h3 { margin:0 0 10px; } .card .row { display:flex; gap:10px; margin:6px 0; }
  .card .k { color:var(--muted); width:130px; flex:none; } .card code { color:#9ee6b4; }
  .hint { color:var(--muted); text-align:center; margin-top:40px; }

  /* ---- landing ---- */
  #landing { height:100vh; display:flex; align-items:center; justify-content:center; padding:20px; }
  .land { width:540px; max-width:100%; background:var(--panel); border:1px solid var(--line);
          border-radius:14px; padding:34px 36px; text-align:center; }
  .land .mark { font-size:13px; letter-spacing:.18em; text-transform:uppercase; color:var(--muted); }
  .land h1 { margin:8px 0 6px; font-size:26px; }
  .land p { color:var(--muted); margin:0 auto 22px; max-width:420px; }
  .open { display:inline-flex; align-items:center; gap:9px; background:var(--accent); color:var(--accentTx);
          border:none; border-radius:9px; padding:13px 26px; font-size:15px; font-weight:600; cursor:pointer; }
  .open:hover { filter:brightness(1.12); }
  .open svg { width:18px; height:18px; }
  .manual { margin-top:22px; padding-top:18px; border-top:1px solid var(--line); }
  .manual .lbl { font-size:12px; color:var(--muted); margin-bottom:8px; }
  .manual .grp { display:flex; gap:8px; }
  .manual input { flex:1; background:#10141b; color:var(--text); border:1px solid var(--line);
                  border-radius:7px; padding:9px 11px; font-size:13px; font-family:ui-monospace,monospace; }
  .manual button { background:#1d2430; color:var(--text); border:1px solid var(--line); border-radius:7px;
                   padding:9px 16px; cursor:pointer; }
  .status { margin-top:18px; min-height:20px; font-size:13px; }
  .status.err { color:#ff7a85; } .status.busy { color:var(--muted); }
  .spin { display:inline-block; width:13px; height:13px; margin-right:8px; vertical-align:-2px;
          border:2px solid var(--line); border-top-color:var(--accentTx); border-radius:50%;
          animation:rot .8s linear infinite; }
  @keyframes rot { to { transform:rotate(360deg); } }
  .hidden { display:none !important; }
</style>
</head>
<body>

<!-- ====================== LANDING ====================== -->
<div id="landing">
  <div class="land">
    <div class="mark">Patent Filing QC</div>
    <h1>Open the filing folder</h1>
    <p>Select the folder containing this application's filing documents. The quality
       checks run automatically and the results appear here.</p>
    <button class="open" id="openBtn">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
           stroke-linecap="round" stroke-linejoin="round"><path d="M3 7a2 2 0 0 1 2-2h4l2 3h8a2 2 0 0 1 2 2v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg>
      Open filing folder…
    </button>
    <div class="manual">
      <div class="lbl">…or paste the folder path (for shared / hosted setups)</div>
      <div class="grp">
        <input id="pathInput" placeholder="/path/to/the/filing/folder" spellcheck="false">
        <button id="runBtn">Run QC</button>
      </div>
    </div>
    <div class="status" id="status"></div>
  </div>
</div>

<!-- ====================== APP ====================== -->
<div id="app" class="hidden">
  <header>
    <b>Patent Filing QC</b><span class="folder" id="folder"></span>
    <button class="hbtn" id="rerunBtn" title="Re-run the checks (after editing files)">Re-run</button>
    <button class="hbtn" id="changeBtn">Open another folder</button>
    <span class="counts" id="counts"></span>
    <div class="filters" id="filters"></div>
  </header>
  <div class="wrap">
    <div class="checks" id="checks"></div>
    <div class="viewer" id="viewer"><div class="hint">Select a check with a receipt on the left.</div></div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script>
pdfjsLib.GlobalWorkerOptions.workerSrc =
  "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";

const VIEW_W = 780;
let pdfCache = {};
let RESULT = null, FILTER = "receipts", FOLDER = null;

const $ = id => document.getElementById(id);
const qF = () => "folder=" + encodeURIComponent(FOLDER || "");

/* ---------- folder selection / loading ---------- */
function setStatus(msg, cls) { const s=$("status"); s.className="status "+(cls||""); s.innerHTML=msg; }

async function pick() {
  setStatus('<span class="spin"></span>Folder chooser is open — pick a folder (check behind this window).', "busy");
  try {
    const r = await fetch("/api/pick"); const d = await r.json();
    if (d.path) { $("pathInput").value = d.path; loadFolder(d.path); }
    else if (d.error) setStatus("Folder chooser unavailable: " + d.error + " — paste the path below instead.", "err");
    else setStatus("No folder selected.", "");
  } catch (e) { setStatus("Could not open the folder chooser. Paste the path instead.", "err"); }
}

async function loadFolder(folder, refresh) {
  FOLDER = folder; pdfCache = {};
  setStatus('<span class="spin"></span>Running quality checks on<br><code>'+folder+'</code>…', "busy");
  try {
    const r = await fetch("/api/result?" + qF() + (refresh ? "&refresh=1" : ""));
    const d = await r.json();
    if (!r.ok) { setStatus("Error: " + (d.error || r.status), "err"); return; }
    RESULT = d; enterApp();
  } catch (e) { setStatus("Error running checks: " + e, "err"); }
}

function enterApp() {
  $("landing").classList.add("hidden");
  $("app").classList.remove("hidden");
  $("viewer").innerHTML = '<div class="hint">Select a check with a receipt on the left.</div>';
  setup();
}

function backToLanding() {
  $("app").classList.add("hidden");
  $("landing").classList.remove("hidden");
  setStatus("", "");
}

/* ---------- PDF rendering ---------- */
async function loadPdf(docType) {
  if (pdfCache[docType]) return pdfCache[docType];
  const buf = await (await fetch(`/api/pdf/${encodeURIComponent(docType)}?` + qF())).arrayBuffer();
  const pdf = await pdfjsLib.getDocument({ data: buf }).promise;
  pdfCache[docType] = pdf;
  return pdf;
}

async function showRegion(docType, page, bbox) {
  const v = $("viewer"); v.innerHTML = "Loading…";
  const pdf = await loadPdf(docType);
  const p = await pdf.getPage(page + 1);
  const scale = VIEW_W / p.getViewport({ scale: 1 }).width;
  const vp = p.getViewport({ scale });
  v.innerHTML = "";
  const wrap = document.createElement("div"); wrap.className = "pagewrap";
  const canvas = document.createElement("canvas");
  canvas.width = vp.width; canvas.height = vp.height; wrap.appendChild(canvas);
  if (bbox && (bbox[2] - bbox[0]) > 0) {
    const hl = document.createElement("div"); hl.className = "hl";
    hl.style.left = bbox[0]*scale+"px"; hl.style.top = bbox[1]*scale+"px";
    hl.style.width = (bbox[2]-bbox[0])*scale+"px"; hl.style.height = (bbox[3]-bbox[1])*scale+"px";
    wrap.appendChild(hl);
  }
  v.appendChild(wrap);
  await p.render({ canvasContext: canvas.getContext("2d"), viewport: vp }).promise;
  const hl = wrap.querySelector(".hl"); if (hl) hl.scrollIntoView({ block:"center", behavior:"smooth" });
}

function showCard(ev) {
  const L = ev.locator;
  $("viewer").innerHTML = `
    <div class="card"><h3>Structured data receipt</h3>
      <div class="row"><div class="k">Document</div><div>${ev.doc_type} (XFA — no page geometry)</div></div>
      <div class="row"><div class="k">Field</div><div><code>${L.field_path||""}</code></div></div>
      <div class="row"><div class="k">Value</div><div><code>${ev.actual ?? "—"}</code></div></div>
      <div class="row"><div class="k">Expected</div><div><code>${ev.expected ?? "—"}</code></div></div>
      <div class="row"><div class="k">Verdict</div><div>${ev.kind}</div></div>
      <div class="row"><div class="k">Note</div><div>${ev.label||""}</div></div></div>`;
}

function activate(ev) {
  const L = ev.locator || {};
  if (L.type === "pdf_region") showRegion(ev.doc_type, L.page||0, L.bbox);
  else if (L.type === "pdf_page") showRegion(ev.doc_type, L.page||0, null);
  else if (L.type === "xfa_field") showCard(ev);
}

/* ---------- checks list ---------- */
function render() {
  const root = $("checks"); root.innerHTML = "";
  const issues = RESULT.issues.filter(i =>
    FILTER === "all" ? true :
    FILTER === "receipts" ? (i.evidence && i.evidence.length) :
    i.severity === FILTER);
  issues.forEach(issue => {
    const el = document.createElement("div"); el.className = "check";
    el.innerHTML = `<div><span class="badge ${issue.severity}">${issue.severity}</span>
      <span class="cname">${issue.check_id}. ${issue.check_name}</span></div>
      <div class="cmsg">${issue.message}</div>`;
    (issue.evidence||[]).forEach(ev => {
      const e = document.createElement("div"); e.className = "ev " + (ev.kind||"");
      e.innerHTML = `<div class="tag">${ev.locator.type} · ${ev.kind}</div><div>${ev.label||ev.snippet||""}</div>`;
      e.onclick = () => activate(ev);
      el.appendChild(e);
    });
    root.appendChild(el);
  });
  if (!issues.length) root.innerHTML = `<div class="hint">No checks match this filter.</div>`;
}

function setup() {
  $("folder").textContent = RESULT.folder;
  const counts = {}; RESULT.issues.forEach(i => counts[i.severity]=(counts[i.severity]||0)+1);
  $("counts").innerHTML =
    ["CRITICAL","WARNING","INFO","PASS"].filter(s=>counts[s])
      .map(s=>`<span class="badge ${s}">${counts[s]} ${s}</span>`).join("");
  const withEv = RESULT.issues.filter(i=>i.evidence&&i.evidence.length).length;
  const f = $("filters"); f.innerHTML = "";
  [["receipts",`Receipts (${withEv})`],["all","All"],["CRITICAL","Critical"],
   ["WARNING","Warning"],["INFO","Info"],["PASS","Pass"]].forEach(([k,lbl])=>{
    const b=document.createElement("button"); b.textContent=lbl;
    if(k===FILTER) b.className="on";
    b.onclick=()=>{FILTER=k; [...f.children].forEach(c=>c.classList.remove("on")); b.classList.add("on"); render();};
    f.appendChild(b);
  });
  render();
}

/* ---------- wiring ---------- */
$("openBtn").onclick = pick;
$("runBtn").onclick = () => { const p=$("pathInput").value.trim(); if(p) loadFolder(p); };
$("pathInput").addEventListener("keydown", e => { if(e.key==="Enter"){ const p=e.target.value.trim(); if(p) loadFolder(p); }});
$("changeBtn").onclick = backToLanding;
$("rerunBtn").onclick = () => { backToLanding(); loadFolder(FOLDER, true); };

// If the server was started with a folder argument, skip the landing screen.
fetch("/api/config").then(r=>r.json()).then(c=>{ if (c.preselected) loadFolder(c.preselected); });
</script>
</body>
</html>
